name: Align README once

on:
  push:
    branches: ["chore/production-baseline"]

permissions:
  contents: write

jobs:
  align:
    if: ${{ !contains(github.event.head_commit.message, '[docs-aligned]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chore/production-baseline
          fetch-depth: 0

      - name: Align factual documentation
        run: node scripts/check-docs-facts.mjs --write

      - name: Remove one-shot workflow
        run: rm .github/workflows/align-readme-once.yml

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md scripts/check-docs-facts.mjs .github/workflows/align-readme-once.yml
          git diff --cached --quiet && exit 0
          git commit -m "docs: align installation with published package [docs-aligned]"
          git push origin HEAD:chore/production-baseline
