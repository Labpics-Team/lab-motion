name: Browser conformance

# Browser matrix (issue #102, фаза D): сверка СОБРАННОГО dist с реальным
# поведением трёх движков (Chromium/Firefox/WebKit). Гейт запускается для каждого
# PR: required check не должен исчезать из-за paths-фильтра. Артефакты
# (trace/video) выгружаются только при сбое.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: browser-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  COREPACK_DEFAULT_TO_LATEST: "0"

jobs:
  conformance:
    name: ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Токен не нужен после checkout (пуша нет) — не оставляем его на диске
          # перед pnpm install (postinstall-скрипты третьих сторон). SAST: artipacked.
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "24"

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Устанавливаем ТОЛЬКО нужный движок матрицы (+ системные зависимости).
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      # Типопроверка browser-спеков (отдельный tsconfig: DOM lib + /dist/*→src/*
      # path-mapping) — специфичный tsc не входит в основной `pnpm typecheck`.
      - name: Typecheck browser specs
        run: pnpm typecheck:browser

      # Спеки грузят СОБРАННЫЙ dist — билд обязателен до прогона.
      - name: Build
        run: pnpm build

      - name: Run conformance (${{ matrix.browser }})
        run: pnpm exec playwright test --project=${{ matrix.browser }}

      # Trace/video/screenshot пишутся только on-failure (playwright.config) —
      # выгружаем их лишь когда шаг упал.
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: browser-conformance-${{ matrix.browser }}-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
