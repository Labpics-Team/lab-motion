name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  COREPACK_DEFAULT_TO_LATEST: "0"

jobs:
  publish:
    if: github.repository == 'Labpics-Team/lab-motion'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm supports trusted publishing
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          const raw = execFileSync('npm', ['--version'], { encoding: 'utf8' }).trim();
          const [major, minor, patch] = raw.split('.').map(Number);
          const supported = major > 11 || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1)));
          if (!supported) {
            console.error(`npm ${raw} не поддерживает trusted publishing; требуется >= 11.5.1`);
            process.exit(1);
          }
          console.log(`npm ${raw}: trusted publishing поддержан`);
          NODE

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@10.34.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release identity
        run: node scripts/check-release.mjs

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Factual documentation drift
        run: node scripts/check-docs-facts.mjs

      - name: Test
        run: pnpm test

      - name: Fuzz finiteness gate
        run: pnpm vitest run --reporter=verbose test/animate-overflow-finiteness-fuzz.test.ts test/solver-finiteness-fuzz.test.ts test/easing-finiteness-fuzz.test.ts

      - name: Size gate
        run: pnpm size

      - name: Pack smoke
        run: pnpm pack:smoke

      # Все publish-гейты уже выполнены выше. ignore-scripts предотвращает их
      # повторный запуск внутри npm lifecycle и не ослабляет проверенный артефакт.
      - name: Publish through npm trusted publishing
        run: npm publish --access public --ignore-scripts

  github-release:
    name: GitHub Release
    if: github.repository == 'Labpics-Team/lab-motion'
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Create immutable release record
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
