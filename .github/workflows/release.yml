name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Версия x.y.z — тег v<version> будет создан из HEAD main"
        required: true
        type: string

# Каждый job объявляет только собственные полномочия.
permissions: {}

concurrency:
  # Весь пакет имеет одну очередь: разные версии не должны гоняться за npm latest.
  group: release-labpics-motion
  cancel-in-progress: false

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  COREPACK_DEFAULT_TO_LATEST: "0"

jobs:
  # Сначала фиксируем намерение релиза без права менять репозиторий.
  resolve:
    if: github.repository == 'Labpics-Team/lab-motion'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      version: ${{ steps.resolve.outputs.version }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
    steps:
      - name: Resolve and validate version
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$INPUT_VERSION"
          [[ "$GITHUB_REF" == "refs/heads/main" ]] \
            || { echo "::error::релиз разрешён только ручным запуском с main, получено: $GITHUB_REF"; exit 1; }
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || { echo "::error::version обязана быть x.y.z, получено: $VERSION"; exit 1; }
          echo "release_tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "source_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify and seal npm package
    needs: [resolve]
    if: >-
      github.repository == 'Labpics-Team/lab-motion' && !cancelled() &&
      needs.resolve.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      EXPECTED_SOURCE_SHA: ${{ needs.resolve.outputs.source_sha }}
    outputs:
      source_sha: ${{ steps.source.outputs.source_sha }}
      artifact_name: ${{ steps.source.outputs.artifact_name }}
      tarball_name: ${{ steps.seal.outputs.tarball_name }}
      tarball_sha256: ${{ steps.seal.outputs.tarball_sha256 }}
      package_identity: ${{ steps.seal.outputs.package_identity }}
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.11.0

      # Проверяем фактически извлечённый коммит до появления релизного тега.
      - name: Verify release source
        id: source
        run: |
          git fetch origin main --quiet
          SOURCE_SHA=$(git rev-parse HEAD)
          [[ "$SOURCE_SHA" == "$EXPECTED_SOURCE_SHA" ]] \
            || { echo "::error::извлечён $SOURCE_SHA вместо ожидаемого $EXPECTED_SOURCE_SHA"; exit 1; }
          git merge-base --is-ancestor "$SOURCE_SHA" origin/main \
            || { echo "::error::релизный коммит находится вне main"; exit 1; }
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "artifact_name=npm-package-$SOURCE_SHA-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Static contract
        run: pnpm check:static

      - name: Verify release identity
        run: node scripts/check-release.mjs "$RELEASE_TAG"

      - name: Issue forms schema
        run: node scripts/check-issue-forms.mjs

      - name: Build
        run: pnpm build

      - name: Install browser conformance engines
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Browser conformance
        run: pnpm test:browser:all

      - name: Factual documentation drift
        run: node scripts/check-docs-facts.mjs

      - name: Test
        run: pnpm test

      - name: Fuzz finiteness gate
        run: pnpm vitest run --reporter=verbose test/*finiteness-fuzz.test.ts

      - name: Size gate
        run: pnpm size

      # Кандидат создаётся один раз. Все следующие проверки читают именно его;
      # повторная упаковка перед publish запрещена.
      - name: Pack release candidate once
        id: pack
        shell: bash
        run: |
          mkdir release-artifact
          pnpm pack --pack-destination release-artifact
          shopt -s nullglob
          archives=(release-artifact/*.tgz)
          [[ ${#archives[@]} -eq 1 ]] \
            || { echo "::error::ожидался ровно один tgz, найдено: ${#archives[@]}"; exit 1; }
          echo "tarball_name=$(basename "${archives[0]}")" >> "$GITHUB_OUTPUT"

      - name: Pack smoke on release candidate
        env:
          TARBALL: release-artifact/${{ steps.pack.outputs.tarball_name }}
        run: node scripts/pack-smoke.mjs "$TARBALL"

      - name: Consumer compatibility on release candidate
        env:
          TARBALL: release-artifact/${{ steps.pack.outputs.tarball_name }}
        run: node scripts/pack-compat.mjs "$TARBALL"

      # pnpm 11 сам требует более новый patch Node 22, поэтому floor-проверка
      # получает уже собранный tgz и исполняет только consumer runtime.
      - name: Setup exact consumer Node floor
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.0.0"
          package-manager-cache: false

      - name: Exact Node 22.0 artifact smoke
        env:
          TARBALL: release-artifact/${{ steps.pack.outputs.tarball_name }}
        run: node scripts/pack-smoke.mjs "$TARBALL"

      # После consumer-гейтов фиксируем идентичность ровно тех байтов, которые
      # upload-artifact передаст publish-job.
      - name: Seal release artifact identity
        id: seal
        env:
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
          TARBALL: release-artifact/${{ steps.pack.outputs.tarball_name }}
        run: |
          node scripts/check-release-artifact.mjs \
            "$TARBALL" "$RELEASE_TAG" "$SOURCE_SHA" \
            release-artifact/release-manifest.json >> "$GITHUB_OUTPUT"

      - name: Upload sealed package
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.source.outputs.artifact_name }}
          path: release-artifact/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: false
          include-hidden-files: false

  publish:
    name: Publish sealed npm package
    concurrency:
      group: npm-publish-${{ needs.resolve.outputs.release_tag }}
      cancel-in-progress: false
    needs: [resolve, verify, tag]
    if: >-
      github.repository == 'Labpics-Team/lab-motion' && !cancelled() &&
      needs.resolve.result == 'success' && needs.verify.result == 'success' &&
      needs.tag.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      EXPECTED_SOURCE_SHA: ${{ needs.verify.outputs.source_sha }}
      EXPECTED_TARBALL_NAME: ${{ needs.verify.outputs.tarball_name }}
      EXPECTED_TARBALL_SHA256: ${{ needs.verify.outputs.tarball_sha256 }}
      EXPECTED_PACKAGE_IDENTITY: ${{ needs.verify.outputs.package_identity }}
      EXPECTED_ARTIFACT_ID: ${{ needs.verify.outputs.artifact_id }}
      EXPECTED_ARTIFACT_NAME: ${{ needs.verify.outputs.artifact_name }}
      EXPECTED_ARTIFACT_DIGEST: ${{ needs.verify.outputs.artifact_digest }}

    steps:
      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download sealed package by artifact ID
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.verify.outputs.artifact_id }}
          path: release-artifact
          merge-multiple: true
          digest-mismatch: error

      # Хеш архива GitHub защищает транспорт, хеш tgz — публикуемые байты.
      - name: Verify artifact transport, digest and identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [[ "$EXPECTED_ARTIFACT_ID" =~ ^[0-9]+$ ]] \
            || { echo "::error::некорректный идентификатор артефакта"; exit 1; }
          [[ "$EXPECTED_ARTIFACT_DIGEST" =~ ^[0-9a-f]{64}$ ]] \
            || { echo "::error::некорректный хеш артефакта"; exit 1; }
          IFS=$'\t' read -r API_DIGEST API_NAME < <(
            gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$EXPECTED_ARTIFACT_ID" \
              --jq '[.digest // "", .name // ""] | @tsv'
          )
          [[ "${API_DIGEST#sha256:}" == "$EXPECTED_ARTIFACT_DIGEST" ]] \
            || { echo "::error::хеш артефакта в API не совпадает с выходом verify job"; exit 1; }
          [[ "$API_NAME" == "$EXPECTED_ARTIFACT_NAME" ]] \
            || { echo "::error::имя артефакта в API не совпадает с выходом verify job"; exit 1; }

          mapfile -t files < <(find release-artifact -type f -print | sort)
          [[ ${#files[@]} -eq 2 ]] \
            || { echo "::error::артефакт обязан содержать ровно tgz и манифест"; exit 1; }
          [[ -z "$(find release-artifact -type l -print -quit)" ]] \
            || { echo "::error::артефакт не должен содержать ссылки"; exit 1; }
          [[ ! -L release-artifact/release-manifest.json ]] \
            || { echo "::error::манифест не может быть ссылкой"; exit 1; }
          TARBALL="release-artifact/$EXPECTED_TARBALL_NAME"
          [[ -f "$TARBALL" && ! -L "$TARBALL" ]] \
            || { echo "::error::ожидаемый tgz отсутствует или является ссылкой"; exit 1; }
          ACTUAL_SHA256=$(sha256sum "$TARBALL" | cut -d' ' -f1)
          [[ "$ACTUAL_SHA256" == "$EXPECTED_TARBALL_SHA256" ]] \
            || { echo "::error::SHA-256 tgz не совпадает с проверенным"; exit 1; }

          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          const fail = (message) => {
            console.error(`::error::${message}`);
            process.exit(1);
          };
          const manifest = JSON.parse(readFileSync('release-artifact/release-manifest.json', 'utf8'));
          if (manifest.schema !== 1) fail('неподдерживаемая схема release-манифеста');
          if (manifest.release?.tag !== process.env.RELEASE_TAG) fail('тег манифеста не совпадает');
          if (manifest.release?.sourceSha !== process.env.EXPECTED_SOURCE_SHA) fail('source SHA манифеста не совпадает');
          if (manifest.package?.identity !== process.env.EXPECTED_PACKAGE_IDENTITY) fail('идентичность пакета не совпадает');
          if (manifest.artifact?.file !== process.env.EXPECTED_TARBALL_NAME) fail('имя tgz манифеста не совпадает');
          if (manifest.artifact?.sha256 !== process.env.EXPECTED_TARBALL_SHA256) fail('digest tgz манифеста не совпадает');
          NODE

      - name: Verify npm supports trusted publishing
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          const raw = execFileSync('npm', ['--version'], { encoding: 'utf8' }).trim();
          const [major, minor, patch] = raw.split('.').map(Number);
          const supported = major > 11 || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1)));
          if (!supported) {
            console.error(`npm ${raw} не поддерживает trusted publishing; требуется >= 11.5.1`);
            process.exit(1);
          }
          console.log(`npm ${raw}: trusted publishing поддержан`);
          NODE

      # Tag-job уже зафиксировал ref без OIDC. Перед публикацией
      # повторно читаем серверное состояние и принимаем только наш SHA.
      - name: Verify locked release tag binding
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
          EXISTING_REF=$(
            gh api graphql \
              -f query='query($owner: String!, $name: String!, $qualifiedName: String!) {
                repository(owner: $owner, name: $name) {
                  ref(qualifiedName: $qualifiedName) { target { __typename oid } }
                }
              }' \
              -F owner="$OWNER" \
              -F name="$REPOSITORY_NAME" \
              -F qualifiedName="refs/tags/$RELEASE_TAG" \
              --jq '(.data.repository.ref.target // empty) | [.__typename, .oid] | @tsv'
          )
          if [[ -z "$EXISTING_REF" ]]; then
            echo "::error::$RELEASE_TAG не создан tag-job"
            exit 1
          fi

          read -r OBJECT_TYPE OBJECT_SHA <<< "$EXISTING_REF"
          case "$OBJECT_TYPE" in
            Commit) OBJECT_TYPE=commit ;;
            Tag) OBJECT_TYPE=tag ;;
          esac
          for _ in {1..8}; do
            if [[ "$OBJECT_TYPE" == "commit" ]]; then
              EXISTING="$OBJECT_SHA"
              break
            fi
            [[ "$OBJECT_TYPE" == "tag" ]] \
              || { echo "::error::тег указывает на недопустимый объект $OBJECT_TYPE"; exit 1; }
            read -r OBJECT_TYPE OBJECT_SHA < <(
              gh api "repos/$GITHUB_REPOSITORY/git/tags/$OBJECT_SHA" \
                --jq '[.object.type, .object.sha] | @tsv'
            )
          done
          [[ -n "${EXISTING:-}" ]] \
            || { echo "::error::не удалось раскрыть $RELEASE_TAG до commit"; exit 1; }
          [[ "$EXISTING" == "$EXPECTED_SOURCE_SHA" ]] \
            || { echo "::error::$RELEASE_TAG уже указывает на $EXISTING"; exit 1; }
          echo "$RELEASE_TAG уже указывает на проверенный коммит"

      - name: Publish or reconcile verified tarball through npm OIDC
        env:
          TARBALL: release-artifact/${{ needs.verify.outputs.tarball_name }}
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { createHash } from 'node:crypto';
          import { readFileSync } from 'node:fs';
          import { setTimeout as delay } from 'node:timers/promises';

          const fail = (message) => {
            throw new Error(message);
          };
          const identity = process.env.EXPECTED_PACKAGE_IDENTITY;
          const separator = identity.lastIndexOf('@');
          if (separator <= 0) fail(`некорректная идентичность пакета: ${identity}`);
          const name = identity.slice(0, separator);
          const version = identity.slice(separator + 1);
          const integrity = `sha512-${createHash('sha512')
            .update(readFileSync(process.env.TARBALL))
            .digest('base64')}`;
          const provenanceType = 'https://slsa.dev/provenance/v1';
          const packageUrl = `https://registry.npmjs.org/${encodeURIComponent(name)}`;
          const registryUrl = `${packageUrl}/${encodeURIComponent(version)}`;

          function stableVersion(value, label) {
            const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(value);
            if (!match) fail(`${label} не является стабильной версией x.y.z: ${String(value)}`);
            return match.slice(1).map((part) => BigInt(part));
          }

          function compareVersions(left, right) {
            for (let index = 0; index < left.length; index++) {
              if (left[index] < right[index]) return -1;
              if (left[index] > right[index]) return 1;
            }
            return 0;
          }

          async function assertMonotonicLatest() {
            const response = await fetch(`${packageUrl}?latest=${Date.now()}`, {
              cache: 'no-store',
              headers: { accept: 'application/json' },
            });
            if (response.status === 404) return;
            if (!response.ok) fail(`npm packument ответил ${response.status}`);
            const packument = await response.json();
            const latest = packument['dist-tags']?.latest;
            if (typeof latest !== 'string') fail('npm packument не содержит dist-tags.latest');
            if (compareVersions(stableVersion(version, 'кандидат'), stableVersion(latest, 'npm latest')) < 0) {
              fail(`кандидат ${version} ниже npm latest ${latest} и не может его откатить`);
            }
            console.log(`npm latest ${latest}; кандидат ${version} не откатывает dist-tag`);
          }

          async function lookup() {
            const response = await fetch(`${registryUrl}?reconcile=${Date.now()}`, {
              cache: 'no-store',
              headers: { accept: 'application/json' },
            });
            if (response.status === 404) return null;
            if (!response.ok) fail(`npm registry ответил ${response.status}`);
            return response.json();
          }

          async function reconcile(attempts) {
            for (let attempt = 1; attempt <= attempts; attempt++) {
              const metadata = await lookup();
              if (metadata !== null) {
                const published = metadata.dist?.integrity;
                if (published !== integrity) {
                  fail(`версия уже существует с другим integrity: ${String(published)}`);
                }
                if (
                  metadata.dist?.attestations?.provenance?.predicateType === provenanceType &&
                  typeof metadata.dist?.attestations?.url === 'string'
                ) {
                  return true;
                }
              }
              if (attempt < attempts) await delay(5_000);
            }
            return false;
          }

          if (await reconcile(1)) {
            console.log(`${identity} уже опубликован с проверенными байтами и provenance`);
            process.exit(0);
          }

          await assertMonotonicLatest();

          let publishError;
          try {
            execFileSync(
              'npm',
              ['publish', process.env.TARBALL, '--access', 'public', '--provenance', '--ignore-scripts'],
              { stdio: 'inherit' },
            );
          } catch (error) {
            publishError = error;
          }

          if (await reconcile(12)) {
            console.log(`${identity}: registry integrity и provenance подтверждены`);
            process.exit(0);
          }
          if (publishError) throw publishError;
          fail(`${identity} не появился в registry с provenance после npm publish`);
          NODE

      - name: Verify registry provenance statement and signatures
        env:
          TARBALL: release-artifact/${{ needs.verify.outputs.tarball_name }}
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { createHash } from 'node:crypto';
          import { mkdtempSync, readFileSync, rmSync, writeFileSync } from 'node:fs';
          import { tmpdir } from 'node:os';
          import { join } from 'node:path';

          const fail = (message) => { throw new Error(message); };
          const identity = process.env.EXPECTED_PACKAGE_IDENTITY;
          const separator = identity.lastIndexOf('@');
          const name = identity.slice(0, separator);
          const version = identity.slice(separator + 1);
          const sha512 = createHash('sha512').update(readFileSync(process.env.TARBALL)).digest('hex');
          const versionUrl = `https://registry.npmjs.org/${encodeURIComponent(name)}/${encodeURIComponent(version)}`;
          const metadataResponse = await fetch(`${versionUrl}?provenance=${Date.now()}`, { cache: 'no-store' });
          if (!metadataResponse.ok) fail(`metadata provenance: HTTP ${metadataResponse.status}`);
          const metadata = await metadataResponse.json();
          const attestationUrl = metadata.dist?.attestations?.url;
          if (metadata.dist?.attestations?.provenance?.predicateType !== 'https://slsa.dev/provenance/v1') {
            fail('registry metadata не подтверждает SLSA provenance v1');
          }
          const parsedUrl = new URL(attestationUrl);
          if (parsedUrl.origin !== 'https://registry.npmjs.org') {
            fail(`недоверенный endpoint attestations: ${parsedUrl.origin}`);
          }
          const attestationResponse = await fetch(parsedUrl, { cache: 'no-store' });
          if (!attestationResponse.ok) fail(`attestations: HTTP ${attestationResponse.status}`);
          const collection = await attestationResponse.json();
          const attestation = collection.attestations?.find(
            (item) => item.predicateType === 'https://slsa.dev/provenance/v1',
          );
          if (!attestation?.bundle?.dsseEnvelope?.payload) fail('SLSA attestation отсутствует');
          const statement = JSON.parse(
            Buffer.from(attestation.bundle.dsseEnvelope.payload, 'base64').toString('utf8'),
          );
          const expectedSubject = `pkg:npm/${name.replace(/^@/, '%40')}@${version}`;
          const subject = statement.subject?.find((item) => item.name === expectedSubject);
          if (subject?.digest?.sha512 !== sha512) fail('subject digest provenance не совпадает с tgz');

          const definition = statement.predicate?.buildDefinition;
          const workflow = definition?.externalParameters?.workflow;
          if (workflow?.repository !== 'https://github.com/Labpics-Team/lab-motion') {
            fail('provenance указывает на другой репозиторий');
          }
          if (workflow?.path !== '.github/workflows/release.yml' || workflow?.ref !== 'refs/heads/main') {
            fail('provenance указывает на другой workflow/ref');
          }
          const source = definition?.resolvedDependencies?.find(
            (item) => item.digest?.gitCommit === process.env.EXPECTED_SOURCE_SHA,
          );
          if (!source) fail('provenance не содержит проверенный source SHA');
          if (statement.predicate?.runDetails?.builder?.id !== 'https://github.com/actions/runner/github-hosted') {
            fail('provenance создан не GitHub-hosted runner');
          }
          const invocation = statement.predicate?.runDetails?.metadata?.invocationId;
          if (!invocation?.startsWith('https://github.com/Labpics-Team/lab-motion/actions/runs/')) {
            fail('provenance invocation относится к другому репозиторию');
          }

          // npm CLI криптографически проверяет registry- и SLSA-подписи;
          // разбор выше дополнительно связывает statement с нашим SHA/workflow.
          const audit = mkdtempSync(join(tmpdir(), 'labmotion-provenance-'));
          try {
            writeFileSync(join(audit, 'package.json'), JSON.stringify({ name: 'provenance-audit', private: true }));
            execFileSync(
              'npm',
              ['install', '--ignore-scripts', '--no-audit', '--no-fund', '--registry=https://registry.npmjs.org', identity],
              { cwd: audit, stdio: 'inherit' },
            );
            execFileSync('npm', ['audit', 'signatures'], { cwd: audit, stdio: 'inherit' });
          } finally {
            rmSync(audit, { recursive: true, force: true });
          }
          console.log(`${identity}: provenance привязан к проверенному source и подписи валидны`);
          NODE

  tag:
    name: Create verified release tag
    needs: [resolve, verify]
    if: >-
      github.repository == 'Labpics-Team/lab-motion' && !cancelled() &&
      needs.resolve.result == 'success' && needs.verify.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      EXPECTED_SOURCE_SHA: ${{ needs.verify.outputs.source_sha }}

    steps:
      # После всех гейтов, но до выдачи OIDC, фиксируем точный ref.
      # Сбой npm оставит проверенный тег, который безопасно переиспользует rerun.
      - name: Create or verify tag idempotently
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
          EXISTING_REF=$(
            gh api graphql \
              -f query='query($owner: String!, $name: String!, $qualifiedName: String!) {
                repository(owner: $owner, name: $name) {
                  ref(qualifiedName: $qualifiedName) { target { __typename oid } }
                }
              }' \
              -F owner="$OWNER" \
              -F name="$REPOSITORY_NAME" \
              -F qualifiedName="refs/tags/$RELEASE_TAG" \
              --jq '(.data.repository.ref.target // empty) | [.__typename, .oid] | @tsv'
          )
          if [[ -z "$EXISTING_REF" ]]; then
            # Конкурентный job мог создать ref после lookup. В любом исходе
            # create перечитываем серверное состояние и принимаем только наш SHA.
            if ! gh api "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/tags/$RELEASE_TAG" -f sha="$EXPECTED_SOURCE_SHA"; then
              echo "::warning::создание $RELEASE_TAG не подтверждено; проверяем итоговый ref"
            fi
            EXISTING_REF=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" \
              --jq '[.object.type, .object.sha] | @tsv')
          fi

          read -r OBJECT_TYPE OBJECT_SHA <<< "$EXISTING_REF"
          case "$OBJECT_TYPE" in
            Commit) OBJECT_TYPE=commit ;;
            Tag) OBJECT_TYPE=tag ;;
          esac
          for _ in {1..8}; do
            if [[ "$OBJECT_TYPE" == "commit" ]]; then
              EXISTING="$OBJECT_SHA"
              break
            fi
            [[ "$OBJECT_TYPE" == "tag" ]] \
              || { echo "::error::тег указывает на недопустимый объект $OBJECT_TYPE"; exit 1; }
            read -r OBJECT_TYPE OBJECT_SHA < <(
              gh api "repos/$GITHUB_REPOSITORY/git/tags/$OBJECT_SHA" \
                --jq '[.object.type, .object.sha] | @tsv'
            )
          done
          [[ "${EXISTING:-}" == "$EXPECTED_SOURCE_SHA" ]] \
            || { echo "::error::$RELEASE_TAG указывает на ${EXISTING:-unknown}"; exit 1; }
          echo "$RELEASE_TAG зафиксирован на проверенном коммите"

  github-release:
    name: GitHub Release
    needs: [resolve, publish, tag]
    if: >-
      github.repository == 'Labpics-Team/lab-motion' && !cancelled() &&
      needs.publish.result == 'success' && needs.tag.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      EXPECTED_SOURCE_SHA: ${{ needs.resolve.outputs.source_sha }}

    steps:
      - name: Create immutable release record
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_REF=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" \
            --jq '[.object.type, .object.sha] | @tsv')
          read -r OBJECT_TYPE OBJECT_SHA <<< "$TAG_REF"
          for _ in {1..8}; do
            if [[ "$OBJECT_TYPE" == "commit" ]]; then
              TAG_SOURCE_SHA="$OBJECT_SHA"
              break
            fi
            [[ "$OBJECT_TYPE" == "tag" ]] \
              || { echo "::error::тег указывает на недопустимый объект $OBJECT_TYPE"; exit 1; }
            read -r OBJECT_TYPE OBJECT_SHA < <(
              gh api "repos/$GITHUB_REPOSITORY/git/tags/$OBJECT_SHA" \
                --jq '[.object.type, .object.sha] | @tsv'
            )
          done
          [[ "${TAG_SOURCE_SHA:-}" == "$EXPECTED_SOURCE_SHA" ]] \
            || { echo "::error::$RELEASE_TAG указывает на ${TAG_SOURCE_SHA:-unknown}"; exit 1; }

          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
          lookup_release() {
            gh api graphql \
              -f query='query($owner: String!, $name: String!, $tagName: String!) {
                repository(owner: $owner, name: $name) {
                  release(tagName: $tagName) { tagName isDraft isPrerelease }
                }
              }' \
              -F owner="$OWNER" \
              -F name="$REPOSITORY_NAME" \
              -F tagName="$RELEASE_TAG" \
              --jq '(.data.repository.release // empty) | [.tagName, .isDraft, .isPrerelease] | @tsv'
          }

          EXISTING=$(lookup_release)
          if [[ -z "$EXISTING" ]]; then
            # Между lookup и create релиз мог появиться в параллельном job.
            # Ошибка create допустима только если повторное чтение докажет итог.
            if ! gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "$RELEASE_TAG"; then
              echo "::warning::создание GitHub Release не подтверждено; проверяем итоговое состояние"
            fi
            EXISTING=$(lookup_release)
          fi
          IFS=$'\t' read -r ACTUAL_TAG IS_DRAFT IS_PRERELEASE <<< "$EXISTING"
          [[ "$ACTUAL_TAG" == "$RELEASE_TAG" && "$IS_DRAFT" == "false" && "$IS_PRERELEASE" == "false" ]] \
            || { echo "::error::существующий GitHub Release имеет неверное состояние"; exit 1; }
          echo "GitHub Release $RELEASE_TAG подтверждён"
