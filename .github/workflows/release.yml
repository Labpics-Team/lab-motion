name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Диспатч с main — второй равноправный путь релиза: git-транспорт овнер-сессий
  # не пропускает пуш тегов (факт 2026-07-10: push отвечает «up-to-date», ls-remote
  # тегов пуст). Workflow сам создаёт тег и публикует В ОДНОМ прогоне: тег от
  # GITHUB_TOKEN не эмитит push-событие (анти-рекурсия GitHub), поэтому цепочка
  # не полагается на него. Все гейты publish-job идентичны для обоих путей.
  workflow_dispatch:
    inputs:
      version:
        description: "Версия x.y.z — тег v<version> будет создан из HEAD main"
        required: true
        type: string

concurrency:
  # Обе формы одного релиза (tag-push и dispatch) сериализуются одной группой
  # (находка ревью #120: разные группы = гонка двойного publish).
  group: release-${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', inputs.version) || github.ref }}
  cancel-in-progress: false

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  COREPACK_DEFAULT_TO_LATEST: "0"

jobs:
  # Создание тега вынесено в отдельный job: contents:write не смешивается с
  # id-token:write publish-job'а (least-privilege, дисциплина ревью #101).
  tag:
    if: github.event_name == 'workflow_dispatch' && github.repository == 'Labpics-Team/lab-motion'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Validate dispatch inputs
        env:
          VERSION: ${{ inputs.version }}
        run: |
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || { echo "::error::version обязана быть x.y.z, получено: $VERSION"; exit 1; }
          [[ "$GITHUB_REF" == "refs/heads/main" ]] \
            || { echo "::error::диспатч релиза разрешён только с main, получено: $GITHUB_REF"; exit 1; }

      - name: Create tag at main HEAD (идемпотентно)
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          TAG="v$VERSION"
          EXISTING=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" --jq .object.sha 2>/dev/null || true)
          if [[ -n "$EXISTING" ]]; then
            [[ "$EXISTING" == "$GITHUB_SHA" ]] \
              || { echo "::error::тег $TAG уже существует на $EXISTING ≠ $GITHUB_SHA — опубликованная версия не перезаписывается"; exit 1; }
            echo "тег $TAG уже на $GITHUB_SHA — идемпотентный повтор"
          else
            gh api "repos/$GITHUB_REPOSITORY/git/refs" -f ref="refs/tags/$TAG" -f sha="$GITHUB_SHA"
            echo "создан тег $TAG → $GITHUB_SHA"
          fi

  publish:
    # На push tag-job скипается (result=skipped), на диспатче обязан быть success.
    needs: [tag]
    if: >-
      github.repository == 'Labpics-Team/lab-motion' && !cancelled() &&
      (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm supports trusted publishing
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          const raw = execFileSync('npm', ['--version'], { encoding: 'utf8' }).trim();
          const [major, minor, patch] = raw.split('.').map(Number);
          const supported = major > 11 || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1)));
          if (!supported) {
            console.error(`npm ${raw} не поддерживает trusted publishing; требуется >= 11.5.1`);
            process.exit(1);
          }
          console.log(`npm ${raw}: trusted publishing поддержан`);
          NODE

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@10.34.4

      # Тег обязан указывать на коммит, достижимый из main: публикуется только
      # отревьюенная история (находка ревью #101 — иначе любой субъект с правом
      # тегирования публикует произвольный коммит с валидным provenance).
      - name: Verify tag commit is reachable from main
        run: |
          git fetch origin main --quiet
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main \
            || { echo "::error::тег указывает на коммит вне main — публикация запрещена"; exit 1; }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release identity
        run: node scripts/check-release.mjs "$RELEASE_TAG"

      - name: Issue forms schema
        run: node scripts/check-issue-forms.mjs

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Factual documentation drift
        run: node scripts/check-docs-facts.mjs

      - name: Test
        run: pnpm test

      # Глоб = паритет с PR-CI: релизная цепочка не может отстать от гейтов CI
      # (находка ревью #101 — третья копия ручного списка уже дрейфовала).
      - name: Fuzz finiteness gate
        run: pnpm vitest run --reporter=verbose test/*finiteness-fuzz.test.ts

      - name: Size gate
        run: pnpm size

      - name: Pack smoke
        run: pnpm pack:smoke

      # Все publish-гейты уже выполнены выше. ignore-scripts предотвращает их
      # повторный запуск внутри npm lifecycle и не ослабляет проверенный артефакт.
      - name: Publish through npm trusted publishing
        run: npm publish --access public --ignore-scripts

  github-release:
    name: GitHub Release
    if: github.repository == 'Labpics-Team/lab-motion'
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}

    steps:
      - name: Create immutable release record
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "$RELEASE_TAG"
