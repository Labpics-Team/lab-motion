name: Mutation (scheduled)

# Mutation-тестирование ДОРОГОЕ → по расписанию (еженедельно) + вручную,
# НЕ на каждый PR. Валидирует силу сьюта на core-физике; break-порог в
# stryker.config.mjs валит прогон при эрозии mutation score.
on:
  schedule:
    - cron: "0 3 * * 1" # понедельник 03:00 UTC
  workflow_dispatch: {}

jobs:
  mutation:
    name: stryker · core physics
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mutation test (core)
        run: pnpm mutation

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 30
