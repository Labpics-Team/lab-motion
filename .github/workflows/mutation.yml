name: Mutation

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

# Каждый job объявляет только собственные полномочия.
permissions: {}

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  COREPACK_DEFAULT_TO_LATEST: "0"

jobs:
  core:
    name: critical numerical core
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Mutation gate
        run: pnpm mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report-${{ github.run_id }}
          path: reports/mutation/
          if-no-files-found: ignore
          retention-days: 14

  # Право записи issues существует только в job без кода репозитория и зависимостей.
  report-failure:
    name: Report scheduled mutation failure
    needs: [core]
    if: always() && github.event_name == 'schedule' && needs.core.result != 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="mutation: ночной прогон красный ($(date -u +%F))"
          gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" \
            --label "type:hardening,priority:P1" \
            --body "Ночной mutation-прогон не завершился успешно: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID — требуется разобрать причину до ослабления mutation-гейта."
