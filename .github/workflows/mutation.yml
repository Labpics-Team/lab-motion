name: Mutation

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write # эскалация провала ночного прогона (см. шаг ниже)

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  COREPACK_DEFAULT_TO_LATEST: "0"

jobs:
  core:
    name: critical numerical core
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@10.34.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Mutation gate
        run: pnpm mutation

      # Провал schedule-прогона без эскалации живёт неделями незамеченным
      # (находка ревью #101): открываем/дополняем issue от имени workflow.
      - name: Escalate scheduled failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="mutation: ночной прогон красный ($(date -u +%F))"
          gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" \
            --label "type:hardening,priority:P1" \
            --body "Scheduled mutation-прогон упал: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID — разобрать до эрозии mutation-силы ядра." \
            || echo "::warning::не удалось создать issue — проверьте права"

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report-${{ github.run_id }}
          path: reports/mutation/
          if-no-files-found: ignore
          retention-days: 14
