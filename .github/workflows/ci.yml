name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # push в main не отменяем: каждый merge-коммит обязан получить завершённый
  # прогон (иначе красный промежуточный main живёт незамеченным, bisect ломается).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  COREPACK_DEFAULT_TO_LATEST: "0"

jobs:
  verify:
    name: typecheck · build · test · fuzz · size · package
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          # docs-facts сверяет байты с immutable ревизией за пределами HEAD.
          fetch-depth: 0

      # Бинарник и его digest зафиксированы, чтобы валидация workflow не зависела от mutable action.
      - name: GitHub Actions contract
        shell: bash
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_ARCHIVE_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          install_dir="$RUNNER_TEMP/actionlint"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            --output "$archive"
          printf '%s  %s\n' "$ACTIONLINT_ARCHIVE_SHA256" "$archive" | sha256sum --check --status -
          mkdir "$install_dir"
          tar -xzf "$archive" -C "$install_dir"
          "$install_dir/actionlint"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Static contract
        run: pnpm check:static

      - name: Build
        run: pnpm build

      - name: Factual documentation drift
        run: node scripts/check-docs-facts.mjs

      - name: Structural documentation drift
        run: node scripts/check-docs-drift.mjs

      - name: Repository issue forms contract
        run: node scripts/check-issue-forms.mjs

      - name: Release contract smoke
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          node scripts/check-release.mjs "v${version}" --validate-stored-date

      - name: Vitest
        id: vitest
        shell: bash
        run: |
          set +e
          pnpm vitest run 2>&1 | tee vitest.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload Vitest diagnostics
        if: steps.vitest.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vitest-diagnostics-${{ github.run_id }}
          path: vitest.log
          if-no-files-found: error
          retention-days: 7

      # Глоб вместо ручного списка: новый test/*-finiteness-fuzz.test.ts попадает в
      # гейт автоматически (класс дрейфа «забытый файл в трёх копиях списка» закрыт;
      # находка ревью #101 — потеря projection-fuzz при наивном разрешении конфликта).
      - name: Fuzz · finiteness gate (virtual-time, seeded LCG, zero-dep)
        run: pnpm vitest run --reporter=verbose test/*finiteness-fuzz.test.ts

      - name: Size gate
        run: pnpm size

      - name: Pack smoke
        run: pnpm pack:smoke

      - name: Consumer compatibility
        run: pnpm pack:compat

      # Exact Node-floor job не может запускать pnpm 11 (его собственный floor
      # выше потребительского). Собираем кандидат на Node 24 и передаём байты.
      - name: Pack Node-floor candidate
        run: |
          mkdir node-floor-artifact
          pnpm pack --pack-destination node-floor-artifact

      - name: Upload Node-floor candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: node-floor-package-${{ github.sha }}-${{ github.run_id }}
          path: node-floor-artifact/*.tgz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: false

  node-floor:
    name: consumer contract · Node ${{ matrix.node }}
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: ["22.0.0", "24"]

    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}

      - name: Download Node-floor candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: node-floor-package-${{ github.sha }}-${{ github.run_id }}
          path: node-floor-artifact
          digest-mismatch: error

      - name: Exact runtime consumer smoke
        shell: bash
        run: |
          shopt -s nullglob
          archives=(node-floor-artifact/*.tgz)
          [[ ${#archives[@]} -eq 1 ]] \
            || { echo "::error::ожидался ровно один tgz, найдено: ${#archives[@]}"; exit 1; }
          node scripts/pack-smoke.mjs "${archives[0]}"
