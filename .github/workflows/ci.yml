name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  quality:
    name: typecheck · build · test · fuzz · size · pack
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        run: npm install --global pnpm@10.34.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Fuzz · overflow finiteness gate
        run: >-
          pnpm vitest run --reporter=verbose
          test/animate-overflow-finiteness-fuzz.test.ts
          test/solver-finiteness-fuzz.test.ts
          test/easing-finiteness-fuzz.test.ts

      - name: Size gate
        run: pnpm size

      - name: Pack smoke · consumer artifact
        run: pnpm pack:smoke
