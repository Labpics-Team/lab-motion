name: CI

on:
  push:
    branches: ["ch02-s1-motionvalue-headless-core", "main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    name: typecheck · test · build
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Fuzz · overflow finiteness gate (virtual-time, seeded LCG, zero-dep)
        run: pnpm vitest run --reporter=verbose test/animate-overflow-finiteness-fuzz.test.ts test/solver-finiteness-fuzz.test.ts test/easing-finiteness-fuzz.test.ts

      - name: Size gate
        run: pnpm size
