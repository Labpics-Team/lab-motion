name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · build · test · size · package
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # Глоб вместо ручного списка: новый test/*-finiteness-fuzz.test.ts попадает в
      # гейт автоматически (класс дрейфа «забытый файл в трёх копиях списка» закрыт;
      # находка ревью #101 — потеря projection-fuzz при наивном разрешении конфликта).
      - name: Fuzz · finiteness gate (virtual-time, seeded LCG, zero-dep)
        run: pnpm vitest run --reporter=verbose test/*finiteness-fuzz.test.ts

      - name: Size gate
        run: pnpm size

      - name: Pack smoke
        run: pnpm pack:smoke
